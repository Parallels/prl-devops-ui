name: "Reusable — Tauri Build"

on:
  workflow_call:
    inputs:
      platform:
        description: "Target platform: linux | macos | windows | linux-arm64 | windows-arm64"
        required: true
        type: string
      release_version:
        description: "Full version string, e.g. 0.2.0-canary.42"
        required: true
        type: string
    secrets:
      APPLE_CERTIFICATE:
        required: false
      APPLE_CERT_PASSWORD:
        required: false
      APPLE_API_KEY:
        required: false
      APPLE_API_KEY_ID:
        required: false
      APPLE_API_KEY_ISSUER:
        required: false
      TAURI_SIGNING_PRIVATE_KEY:
        required: false
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: false
      PARALLELS_BUILD_KV_SPN_USER:
        required: false
      PARALLELS_BUILD_KV_SPN_KEY:
        required: false

env:
  NODE_VERSION: "24"

jobs:
  build:
    name: "Tauri (${{ inputs.platform }})"
    runs-on: >-
      ${{ fromJSON(
            inputs.platform == 'macos'         && '"macos-latest"' ||
            inputs.platform == 'windows'       && '"windows-latest"' ||
            inputs.platform == 'linux-arm64'   && '"ubuntu-24.04-arm"' ||
            inputs.platform == 'windows-arm64' && '"windows-11-arm"' ||
            '"ubuntu-latest"'
          ) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # ── Download pre-built web dist ───────────────────────────────────────
      - name: Download web dist
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: dist

      # ── Platform deps — Linux ─────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: inputs.platform == 'linux' || inputs.platform == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            xdg-utils

      # ── Platform deps — macOS signing ─────────────────────────────────────
      - name: Set up macOS keychain for signing
        if: inputs.platform == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No Apple certificate provided — skipping keychain setup"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          # Add to keychain search list so codesign can find it
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          # Set a long timeout so the keychain stays unlocked through the Rust compile
          security set-keychain-settings -lut 7200 build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm -f certificate.p12

      - name: Set up macOS notarization key
        if: inputs.platform == 'macos'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
        run: |
          if [ -z "$APPLE_API_KEY" ]; then
            echo "No Apple API key provided — skipping notarization setup"
            exit 0
          fi
          mkdir -p "$HOME/.private_keys"
          echo "$APPLE_API_KEY" | base64 --decode > \
            "$HOME/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          xcrun notarytool store-credentials "notary-credentials" \
            --key "$HOME/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_KEY_ISSUER"

      # ── Patch version for channel builds ─────────────────────────────────
      # Tauri derives artifact filenames from tauri.conf.json "version".
      # For canary/beta, release_version includes the suffix (0.1.1-canary.4)
      # so the built artifacts are named correctly.
      - name: Set Tauri version to release version
        shell: bash
        run: |
          VERSION="${{ inputs.release_version }}"
          # WiX MSI requires a numeric-only pre-release identifier (semver with digits only).
          # Convert e.g. 0.1.1-canary.5 → 0.1.1-5 (strip the channel name, keep run number).
          # 0.1.1 (production) is unchanged — sed pattern only matches when a channel is present.
          if [[ "${{ inputs.platform }}" == "windows" || "${{ inputs.platform }}" == "windows-arm64" ]]; then
            VERSION=$(echo "$VERSION" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)-[a-zA-Z]+\.([0-9]+)$/\1-\2/')
          fi
          jq --arg v "$VERSION" '.version = $v' \
            src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/node_modules
            ${{ github.workspace }}/packages/*/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{ inputs.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' ||
                inputs.platform == 'windows' && 'x86_64-pc-windows-msvc' ||
                inputs.platform == 'linux-arm64' && 'aarch64-unknown-linux-gnu' ||
                inputs.platform == 'windows-arm64' && 'aarch64-pc-windows-msvc' ||
                'x86_64-unknown-linux-gnu' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install DotNet
        if: inputs.platform == 'windows' || inputs.platform == 'windows-arm64'
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Install AzureSignTool
        if: inputs.platform == 'windows' || inputs.platform == 'windows-arm64'
        run: dotnet tool install --global AzureSignTool

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build Tauri — Linux
        if: inputs.platform == 'linux'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-linux

      - name: Build Tauri — macOS (universal)
        if: inputs.platform == 'macos'
        run: |
          export APPLE_SIGNING_IDENTITY="Developer ID Application: Parallels International GmbH (4C6364ACXT)"
          export TAURI_SIGNING_PRIVATE_KEY="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
          export APPLE_API_KEY="${{ secrets.APPLE_API_KEY_ID }}"
          export APPLE_API_KEY_ID="${{ secrets.APPLE_API_KEY_ID }}"
          export APPLE_API_ISSUER="${{ secrets.APPLE_API_KEY_ISSUER }}"
          export APPLE_API_KEY_PATH="$HOME/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          make build-macos

      - name: Verify macOS code signature
        if: inputs.platform == 'macos'
        run: |
          echo "=== Verifying .app bundle ==="
          find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app" | while read app; do
            codesign --verify --verbose "$app" || { echo "ERROR: App bundle not signed: $app"; exit 1; }
            codesign --display --verbose "$app"
          done
          echo "=== Verifying DMG ==="
          find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | while read dmg; do
            codesign --verify --verbose "$dmg" || { echo "ERROR: DMG not signed: $dmg"; exit 1; }
            codesign --display --verbose "$dmg"
          done
          echo "=== Gatekeeper assessment ==="
          find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app" | while read app; do
            spctl --assess --type execute "$app" || echo "WARNING: $app rejected by Gatekeeper"
          done

      - name: Build Tauri — Windows
        if: inputs.platform == 'windows'
        env:
          SIGNING_KVI: ${{ secrets.PARALLELS_BUILD_KV_SPN_USER }}
          SIGNING_KVS: ${{ secrets.PARALLELS_BUILD_KV_SPN_KEY }}
          SIGNING_KVC: parallels-international-gmbh-digicert-ev-codesign-2024-2027
          SIGNING_KVT: 33874721-dd77-4b7e-97b7-863c2cbe7c73
          SIGNING_KVU: https://kv-vault-build-ev-we.vault.azure.net/
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-windows

      - name: Build Tauri — Linux (ARM64)
        if: inputs.platform == 'linux-arm64'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-linux-arm64

      - name: Build Tauri — Windows (ARM64)
        if: inputs.platform == 'windows-arm64'
        env:
          SIGNING_KVI: ${{ secrets.PARALLELS_BUILD_KV_SPN_USER }}
          SIGNING_KVS: ${{ secrets.PARALLELS_BUILD_KV_SPN_KEY }}
          SIGNING_KVC: parallels-international-gmbh-digicert-ev-codesign-2024-2027
          SIGNING_KVT: 33874721-dd77-4b7e-97b7-863c2cbe7c73
          SIGNING_KVU: https://kv-vault-build-ev-we.vault.azure.net/
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-windows-arm64

      # ── Collect & upload artifacts ────────────────────────────────────────
      - name: Collect Linux artifacts
        if: inputs.platform == 'linux'
        run: |
          mkdir -p release-artifacts
          find src-tauri/target/x86_64-unknown-linux-gnu/release/bundle \
            \( -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts/

      - name: Collect macOS artifacts
        if: inputs.platform == 'macos'
        run: |
          mkdir -p release-artifacts
          # Collect DMGs
          find src-tauri/target/universal-apple-darwin/release/bundle \
            -name "*.dmg" \
            -exec cp {} release-artifacts/ \;
          # Collect .sig files (Tauri updater signatures alongside binaries)
          find src-tauri/target/universal-apple-darwin/release/bundle \
            -name "*.sig" \
            -exec cp {} release-artifacts/ \;
          # Collect .tar.gz files (Tauri updater archives)
          find src-tauri/target/universal-apple-darwin/release/bundle \
            \( -name "*.tar.gz" -o -name "*.tar.gz.sig" \) \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts/

      - name: Collect Windows artifacts
        if: inputs.platform == 'windows'
        run: |
          mkdir -p release-artifacts
          Get-ChildItem -Recurse src-tauri/target/x86_64-pc-windows-msvc/release/bundle `
            -Include "*.msi","*.exe" | Copy-Item -Destination release-artifacts/
          Get-ChildItem release-artifacts/
        shell: pwsh

      - name: Collect Linux ARM64 artifacts
        if: inputs.platform == 'linux-arm64'
        run: |
          mkdir -p release-artifacts
          find src-tauri/target/aarch64-unknown-linux-gnu/release/bundle \
            \( -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts/

      - name: Collect Windows ARM64 artifacts
        if: inputs.platform == 'windows-arm64'
        run: |
          mkdir -p release-artifacts
          Get-ChildItem -Recurse src-tauri/target/aarch64-pc-windows-msvc/release/bundle `
            -Include "*.msi","*.exe" | Copy-Item -Destination release-artifacts/
          Get-ChildItem release-artifacts/
        shell: pwsh

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ inputs.platform == 'linux-arm64' && 'linux-arm64' || inputs.platform == 'windows-arm64' && 'windows-arm64' || inputs.platform }}
          path: release-artifacts/
          retention-days: 1
          if-no-files-found: error
