name: "Reusable — Tauri Build"

on:
  workflow_call:
    inputs:
      platform:
        description: "Target platform: linux | macos | windows"
        required: true
        type: string
      release_version:
        description: "Full version string, e.g. 0.2.0-canary.42"
        required: true
        type: string
    secrets:
      APPLE_CERTIFICATE:
        required: false
      APPLE_CERT_PASSWORD:
        required: false
      APPLE_API_KEY:
        required: false
      APPLE_API_KEY_ID:
        required: false
      APPLE_API_KEY_ISSUER:
        required: false
      TAURI_SIGNING_PRIVATE_KEY:
        required: false
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: false

env:
  NODE_VERSION: "24"

jobs:
  build:
    name: "Tauri (${{ inputs.platform }})"
    runs-on: >-
      ${{ inputs.platform == 'macos' && 'macos-latest' ||
          inputs.platform == 'windows' && 'windows-latest' ||
          'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Download pre-built web dist ───────────────────────────────────────
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      # ── Platform deps — Linux ─────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: inputs.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ── Platform deps — macOS signing ─────────────────────────────────────
      - name: Set up macOS keychain for signing
        if: inputs.platform == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No Apple certificate provided — skipping keychain setup"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm -f certificate.p12

      - name: Set up macOS notarization key
        if: inputs.platform == 'macos'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          if [ -z "$APPLE_API_KEY" ]; then
            echo "No Apple API key provided — skipping notarization setup"
            exit 0
          fi
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY" | base64 --decode > \
            ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{ inputs.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' ||
                inputs.platform == 'windows' && 'x86_64-pc-windows-msvc' ||
                'x86_64-unknown-linux-gnu' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build Tauri — Linux
        if: inputs.platform == 'linux'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-linux

      - name: Build Tauri — macOS (universal)
        if: inputs.platform == 'macos'
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Parallels International GmbH (4C6364ACXT)"
          APPLE_API_KEY_PATH: ${{ format('~/.private_keys/AuthKey_{0}.p8', secrets.APPLE_API_KEY_ID) }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-macos

      - name: Build Tauri — Windows
        if: inputs.platform == 'windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-windows

      # ── Collect & upload artifacts ────────────────────────────────────────
      - name: Collect Linux artifacts
        if: inputs.platform == 'linux'
        run: |
          mkdir -p release-artifacts
          find src-tauri/target/x86_64-unknown-linux-gnu/release/bundle \
            \( -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts/

      - name: Collect macOS artifacts
        if: inputs.platform == 'macos'
        run: |
          mkdir -p release-artifacts
          find src-tauri/target/universal-apple-darwin/release/bundle \
            -name "*.dmg" \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts/

      - name: Collect Windows artifacts
        if: inputs.platform == 'windows'
        run: |
          mkdir -p release-artifacts
          Get-ChildItem -Recurse src-tauri/target/x86_64-pc-windows-msvc/release/bundle `
            -Include "*.msi","*.exe" | Copy-Item -Destination release-artifacts/
          Get-ChildItem release-artifacts/
        shell: pwsh

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ inputs.platform }}
          path: release-artifacts/
          retention-days: 1
          if-no-files-found: error
