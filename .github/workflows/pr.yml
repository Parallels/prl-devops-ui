name: PRL DevOps UI — PR Validation

on:
  pull_request_target:
    branches:
      - main
  workflow_call:
    secrets:
      GH_WORKFLOW_TOKEN:
        description: "GitHub workflow token for releases and operations"
        required: true

# Cancel in-flight runs for the same PR when new commits are pushed
concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "24"

jobs:

  # ── UI Kit ─────────────────────────────────────────────────────────────────

  ui-kit-lint:
    name: "UI Kit: Type Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint UI Kit
        run: make ui-kit-lint

  ui-kit-build:
    name: "UI Kit: Build"
    needs: ui-kit-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build UI Kit
        run: make ui-kit-build

      - name: Upload UI Kit dist
        uses: actions/upload-artifact@v7
        with:
          name: ui-kit-dist
          path: packages/ui-kit/dist
          retention-days: 1

  # ── App ────────────────────────────────────────────────────────────────────

  app-lint:
    name: "App: Type Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: make lint

  app-test:
    name: "App: Test"
    needs: app-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests with coverage
        run: make test-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  app-build:
    name: "App: Build"
    needs: [ui-kit-build, app-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Download UI Kit dist
        uses: actions/download-artifact@v8
        with:
          name: ui-kit-dist
          path: packages/ui-kit/dist

      - name: Build web app
        run: make build-web

      - name: Upload app dist
        uses: actions/upload-artifact@v7
        with:
          name: app-dist
          path: dist/
          retention-days: 1

  # ── Docker ─────────────────────────────────────────────────────────────────

  docker-build:
    name: "Docker: Build"
    needs: [app-build, app-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: prl-devops-ui:pr-${{ github.event.pull_request.number || 'ci' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
