name: PRL DevOps UI — PR Validation

on:
  pull_request:
    branches:
      - main
  workflow_call:
    secrets:
      GH_WORKFLOW_TOKEN:
        description: "GitHub workflow token for releases and operations"
        required: true

permissions:
  contents: read
  pull-requests: write

# Cancel in-flight runs for the same PR when new commits are pushed
concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:

  # ── UI Kit ─────────────────────────────────────────────────────────────────

  ui-kit-lint:
    name: "UI Kit: Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: make ui-kit-lint

  ui-kit-build:
    name: "UI Kit: Build"
    needs: ui-kit-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: make ui-kit-build
      - name: Upload UI Kit dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-kit-dist
          path: packages/ui-kit/dist
          retention-days: 1

  # ── App ────────────────────────────────────────────────────────────────────

  app-lint:
    name: "App: Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: make lint

  app-test:
    name: "App: Tests"
    needs: app-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run tests with coverage
        run: make test-coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  app-build:
    name: "App: Build"
    needs: [ui-kit-build, app-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Download UI Kit dist
        uses: actions/download-artifact@v4
        with:
          name: ui-kit-dist
          path: packages/ui-kit/dist
      - name: Build web app
        run: make build-web
      - name: Upload app dist
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: dist/
          retention-days: 1

  # ── Docker ─────────────────────────────────────────────────────────────────

  docker-build:
    name: "Docker: Build"
    needs: [app-build, app-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: prl-devops-ui:pr-${{ github.event.pull_request.number || 'ci' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
