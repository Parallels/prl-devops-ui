name: "Release — Canary"

run-name: "Canary release ${{ github.run_number }}"

on:
  workflow_dispatch:

permissions:
  contents: write    # create GitHub Release + tags
  packages: write    # push to GHCR
  pull-requests: read

env:
  NODE_VERSION: "24"

jobs:

  # ── Compute version string ────────────────────────────────────────────────

  metadata:
    name: "Metadata"
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.ver.outputs.app_version }}
      release_version: ${{ steps.ver.outputs.release_version }}
      release_tag: ${{ steps.ver.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute canary version
        id: ver
        run: |
          APP_VERSION=$(tr -d '[:space:]' < VERSION)
          RELEASE_VERSION="${APP_VERSION}-canary.${{ github.run_number }}"
          echo "app_version=${APP_VERSION}"        >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${RELEASE_VERSION}"    >> "$GITHUB_OUTPUT"

  # ── Build web app ─────────────────────────────────────────────────────────

  build-web:
    name: "Build: Web"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: make build-web

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  # ── Build Tauri binaries ──────────────────────────────────────────────────

  build-tauri-linux:
    name: "Build: Tauri (Linux)"
    needs: [metadata, build-web]
    uses: ./.github/workflows/release-tauri-build.yml
    with:
      platform: linux
      release_version: ${{ needs.metadata.outputs.release_version }}
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  build-tauri-macos:
    name: "Build: Tauri (macOS)"
    needs: [metadata, build-web]
    uses: ./.github/workflows/release-tauri-build.yml
    with:
      platform: macos
      release_version: ${{ needs.metadata.outputs.release_version }}
    secrets:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  build-tauri-windows:
    name: "Build: Tauri (Windows)"
    needs: [metadata, build-web]
    uses: ./.github/workflows/release-tauri-build.yml
    with:
      platform: windows
      release_version: ${{ needs.metadata.outputs.release_version }}
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  # ── Publish Docker image ──────────────────────────────────────────────────

  docker-publish:
    name: "Docker: Publish"
    needs: [metadata]
    uses: ./.github/workflows/release-docker-publish.yml
    with:
      channel: canary
      release_version: ${{ needs.metadata.outputs.release_version }}
      app_version: ${{ needs.metadata.outputs.app_version }}

  # ── Create GitHub Release ─────────────────────────────────────────────────

  github-release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-web
      - build-tauri-linux
      - build-tauri-macos
      - build-tauri-windows
      - docker-publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: "{web-dist,tauri-linux,tauri-macos,tauri-windows}"
          merge-multiple: false

      - name: Assemble release assets
        run: |
          mkdir -p release-assets
          tar -czf release-assets/prl-devops-ui-web-${{ needs.metadata.outputs.release_version }}.tar.gz \
            -C release-artifacts/web-dist .
          find release-artifacts/tauri-linux   -type f -exec cp {} release-assets/ \;
          find release-artifacts/tauri-macos   -type f -exec cp {} release-assets/ \;
          find release-artifacts/tauri-windows -type f -exec cp {} release-assets/ \;
          cd release-assets
          shasum -a 256 * > checksums.txt
          cat checksums.txt

      - name: Generate latest.json for Tauri updater
        run: |
          VERSION="${{ needs.metadata.outputs.release_version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          read_sig() { cat "$1" 2>/dev/null || echo ""; }

          DMG=$(find release-assets -name "*.dmg" | head -1 | xargs basename 2>/dev/null || echo "")
          APPIMAGE=$(find release-assets -name "*.AppImage" | head -1 | xargs basename 2>/dev/null || echo "")
          MSI=$(find release-assets -name "*.msi" | head -1 | xargs basename 2>/dev/null || echo "")

          jq -n \
            --arg version  "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg dmg         "${BASE_URL}/${DMG}" \
            --arg dmg_sig     "$(read_sig "release-assets/${DMG}.sig")" \
            --arg appimage    "${BASE_URL}/${APPIMAGE}" \
            --arg appimage_sig "$(read_sig "release-assets/${APPIMAGE}.sig")" \
            --arg msi         "${BASE_URL}/${MSI}" \
            --arg msi_sig     "$(read_sig "release-assets/${MSI}.sig")" \
            '{
              version:  $version,
              notes:    "Canary build — not for production use",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { url: $dmg, signature: $dmg_sig },
                "darwin-x86_64":  { url: $dmg, signature: $dmg_sig },
                "linux-x86_64":   { url: $appimage, signature: $appimage_sig },
                "windows-x86_64": { url: $msi, signature: $msi_sig }
              }
            }' > release-assets/latest.json

      - name: Create canary GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          name: ${{ needs.metadata.outputs.release_tag }}
          prerelease: true
          body: |
            > **Pre-release build** — not intended for production use.

            Canary build from `main` at run #${{ github.run_number }}.

            ## Docker

            ```sh
            docker pull ghcr.io/${{ github.repository }}:${{ needs.metadata.outputs.release_version }}
            # or always latest canary:
            docker pull ghcr.io/${{ github.repository }}:canary
            ```

            ## Desktop App

            Download the installer for your platform from the Assets section below.
          files: release-assets/*

  # ── Cleanup old canary images & releases ─────────────────────────────────

  cleanup-canary-images:
    name: "Cleanup: Old canary Docker images"
    runs-on: ubuntu-latest
    needs: [metadata, github-release]
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete old canary images from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./.github/workflow_scripts/cleanup-ghcr-tags.sh
          OWNER=$(echo "${{ github.repository }}" | cut -d/ -f1)
          PACKAGE=$(echo "${{ github.repository }}" | cut -d/ -f2)
          ./.github/workflow_scripts/cleanup-ghcr-tags.sh \
            --package "$PACKAGE" \
            --owner   "$OWNER" \
            --filter  '.*-canary.*' \
            --keep    '${{ needs.metadata.outputs.release_version }}' \
            --verbose

  cleanup-canary-releases:
    name: "Cleanup: Old canary GitHub releases"
    runs-on: ubuntu-latest
    needs: [metadata, github-release]
    steps:
      - name: Delete old canary GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="${{ needs.metadata.outputs.release_tag }}"

          # List all releases tagged with -canary, skip the one we just created
          gh release list \
            --repo "${{ github.repository }}" \
            --limit 100 \
            --json tagName \
            --jq '.[] | .tagName' | \
          grep -- '-canary\.' | \
          grep -v "^${CURRENT_TAG}$" | \
          while IFS= read -r tag; do
            echo "Deleting release: ${tag}"
            gh release delete "$tag" \
              --repo "${{ github.repository }}" \
              --cleanup-tag \
              --yes
          done
