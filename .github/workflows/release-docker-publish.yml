name: "Reusable — Docker Publish"

on:
  workflow_call:
    inputs:
      channel:
        description: "Release channel: canary | beta | production"
        required: true
        type: string
      release_version:
        description: "Full version string, e.g. 0.2.0-canary.42"
        required: true
        type: string
      app_version:
        description: "Base version from VERSION file, e.g. 0.2.0"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-publish:
    name: "Docker: Publish (${{ inputs.channel }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Canary tags ───────────────────────────────────────────────────────
      - name: Generate Docker metadata — canary
        if: inputs.channel == 'canary'
        id: meta-canary
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.release_version }}
            type=raw,value=canary

      # ── Beta tags ─────────────────────────────────────────────────────────
      - name: Generate Docker metadata — beta
        if: inputs.channel == 'beta'
        id: meta-beta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.release_version }}
            type=raw,value=beta

      # ── Production tags ───────────────────────────────────────────────────
      - name: Generate Docker metadata — production
        if: inputs.channel == 'production'
        id: meta-production
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.release_version }}
            type=raw,value=${{ inputs.app_version }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: >-
            ${{ inputs.channel == 'canary' && steps.meta-canary.outputs.tags ||
                inputs.channel == 'beta'   && steps.meta-beta.outputs.tags   ||
                steps.meta-production.outputs.tags }}
          labels: >-
            ${{ inputs.channel == 'canary' && steps.meta-canary.outputs.labels ||
                inputs.channel == 'beta'   && steps.meta-beta.outputs.labels   ||
                steps.meta-production.outputs.labels }}
          build-args: |
            APP_VERSION=${{ inputs.release_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
