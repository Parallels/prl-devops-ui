name: "Release — Production"

run-name: "Production release v${{ github.run_number }}"

on:
  workflow_dispatch:

permissions:
  contents: write    # create GitHub Release + tags
  packages: write    # push to GHCR
  pull-requests: read

env:
  NODE_VERSION: "24"

jobs:

  # ── Compute version string ────────────────────────────────────────────────

  metadata:
    name: "Metadata"
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.ver.outputs.app_version }}
      release_version: ${{ steps.ver.outputs.release_version }}
      release_tag: ${{ steps.ver.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read production version
        id: ver
        run: |
          APP_VERSION=$(tr -d '[:space:]' < VERSION)
          echo "app_version=${APP_VERSION}"        >> "$GITHUB_OUTPUT"
          echo "release_version=${APP_VERSION}"    >> "$GITHUB_OUTPUT"
          echo "release_tag=v${APP_VERSION}"       >> "$GITHUB_OUTPUT"

  # ── Validate changelog ─────────────────────────────────────────────────────
  # Fails if CHANGELOG.md has no entry for the current version.
  # Ensures the "Create Release PR" workflow was run and merged before releasing.

  validate-changelog:
    name: "Validate: Changelog"
    runs-on: ubuntu-latest
    needs: [metadata]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check CHANGELOG.md has entry for ${{ needs.metadata.outputs.release_version }}
        run: |
          chmod +x ./.github/workflow_scripts/validate-changelog-version.sh
          ./.github/workflow_scripts/validate-changelog-version.sh

  # ── Build web app ─────────────────────────────────────────────────────────

  build-web:
    name: "Build: Web"
    runs-on: ubuntu-latest
    needs: [validate-changelog]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web app
        run: make build-web

      - name: Upload web dist
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  # ── Build Tauri binaries ──────────────────────────────────────────────────

  build-tauri-linux:
    name: "Build: Tauri (Linux)"
    needs: [metadata, build-web]
    uses: ./.github/workflows/release-tauri-build.yml
    with:
      platform: linux
      release_version: ${{ needs.metadata.outputs.release_version }}
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  build-tauri-macos:
    name: "Build: Tauri (macOS)"
    needs: [metadata, build-web]
    uses: ./.github/workflows/release-tauri-build.yml
    with:
      platform: macos
      release_version: ${{ needs.metadata.outputs.release_version }}
    secrets:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  build-tauri-windows:
    name: "Build: Tauri (Windows)"
    needs: [metadata, build-web]
    uses: ./.github/workflows/release-tauri-build.yml
    with:
      platform: windows
      release_version: ${{ needs.metadata.outputs.release_version }}
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  build-tauri-linux-arm64:
    name: "Build: Tauri (Linux ARM64)"
    needs: [metadata, build-web]
    uses: ./.github/workflows/release-tauri-build.yml
    with:
      platform: linux-arm64
      release_version: ${{ needs.metadata.outputs.release_version }}
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  build-tauri-windows-arm64:
    name: "Build: Tauri (Windows ARM64)"
    needs: [metadata, build-web]
    uses: ./.github/workflows/release-tauri-build.yml
    with:
      platform: windows-arm64
      release_version: ${{ needs.metadata.outputs.release_version }}
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  # ── Publish Docker image ──────────────────────────────────────────────────

  docker-publish:
    name: "Docker: Publish"
    needs: [metadata, validate-changelog]
    uses: ./.github/workflows/release-docker-publish.yml
    with:
      channel: production
      release_version: ${{ needs.metadata.outputs.release_version }}
      app_version: ${{ needs.metadata.outputs.app_version }}

  # ── Create GitHub Release ─────────────────────────────────────────────────

  github-release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-web
      - build-tauri-linux
      - build-tauri-macos
      - build-tauri-windows
      - build-tauri-linux-arm64
      - build-tauri-windows-arm64
      - docker-publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: "{web-dist,tauri-linux,tauri-macos,tauri-windows,tauri-linux-arm64,tauri-windows-arm64}"
          merge-multiple: false

      - name: Assemble release assets
        run: |
          mkdir -p release-assets
          tar -czf release-assets/prl-devops-ui-web-${{ needs.metadata.outputs.release_version }}.tar.gz \
            -C release-artifacts/web-dist .
          find release-artifacts/tauri-linux        -type f -exec cp {} release-assets/ \;
          find release-artifacts/tauri-macos        -type f -exec cp {} release-assets/ \;
          find release-artifacts/tauri-windows      -type f -exec cp {} release-assets/ \;
          find release-artifacts/tauri-linux-arm64  -type f -exec cp {} release-assets/ \;
          find release-artifacts/tauri-windows-arm64 -type f -exec cp {} release-assets/ \;
          cd release-assets
          shasum -a 256 * > checksums.txt
          cat checksums.txt

      - name: Generate latest.json for Tauri updater
        run: |
          VERSION="${{ needs.metadata.outputs.release_version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read .sig files produced by tauri build (alongside each binary)
          read_sig() { cat "$1" 2>/dev/null || echo ""; }

          DMG=$(find release-assets -name "*.dmg" | head -1 | xargs basename 2>/dev/null || echo "")
          APPIMAGE=$(find release-assets -name "*.AppImage" | grep -iv arm | head -1 | xargs basename 2>/dev/null || echo "")
          APPIMAGE_ARM64=$(find release-assets -name "*arm64*.AppImage" -o -name "*aarch64*.AppImage" | head -1 | xargs basename 2>/dev/null || echo "")
          MSI=$(find release-assets -name "*.msi" | grep -iv arm | head -1 | xargs basename 2>/dev/null || echo "")
          MSI_ARM64=$(find release-assets -name "*arm64*.msi" -o -name "*aarch64*.msi" | head -1 | xargs basename 2>/dev/null || echo "")

          DMG_SIG=$(read_sig "release-assets/${DMG}.sig")
          APPIMAGE_SIG=$(read_sig "release-assets/${APPIMAGE}.sig")
          APPIMAGE_ARM64_SIG=$(read_sig "release-assets/${APPIMAGE_ARM64}.sig")
          MSI_SIG=$(read_sig "release-assets/${MSI}.sig")
          MSI_ARM64_SIG=$(read_sig "release-assets/${MSI_ARM64}.sig")

          jq -n \
            --arg version  "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg dmg              "${BASE_URL}/${DMG}" \
            --arg dmg_sig          "$DMG_SIG" \
            --arg appimage         "${BASE_URL}/${APPIMAGE}" \
            --arg appimage_sig     "$APPIMAGE_SIG" \
            --arg appimage_arm64   "${BASE_URL}/${APPIMAGE_ARM64}" \
            --arg appimage_arm64_sig "$APPIMAGE_ARM64_SIG" \
            --arg msi              "${BASE_URL}/${MSI}" \
            --arg msi_sig          "$MSI_SIG" \
            --arg msi_arm64        "${BASE_URL}/${MSI_ARM64}" \
            --arg msi_arm64_sig    "$MSI_ARM64_SIG" \
            '{
              version:  $version,
              notes:    "See release notes at https://github.com/'"${REPO}"'/releases/tag/v'"${VERSION}"'",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64":   { url: $dmg, signature: $dmg_sig },
                "darwin-x86_64":    { url: $dmg, signature: $dmg_sig },
                "linux-x86_64":     { url: $appimage, signature: $appimage_sig },
                "linux-aarch64":    { url: $appimage_arm64, signature: $appimage_arm64_sig },
                "windows-x86_64":   { url: $msi, signature: $msi_sig },
                "windows-aarch64":  { url: $msi_arm64, signature: $msi_arm64_sig }
              }
            }' > release-assets/latest.json

          echo "Generated latest.json:"
          cat release-assets/latest.json

      - name: Extract changelog for this version
        id: changelog
        run: |
          chmod +x ./.github/workflow_scripts/get-latest-changelog.sh
          NOTES=$(./.github/workflow_scripts/get-latest-changelog.sh \
            --mode GENERATE \
            --changelog CHANGELOG.md)
          DELIM=$(openssl rand -hex 8)
          echo "notes<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$NOTES"          >> "$GITHUB_OUTPUT"
          echo "${DELIM}"        >> "$GITHUB_OUTPUT"

      - name: Create production GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          name: ${{ needs.metadata.outputs.release_tag }}
          prerelease: false
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ## Docker

            ```sh
            docker pull ghcr.io/${{ github.repository }}:${{ needs.metadata.outputs.release_version }}
            ```

            ## Helm

            ```sh
            helm upgrade --install prl-devops-ui ./helm/prl-devops-ui \
              --set image.tag=${{ needs.metadata.outputs.release_version }}
            ```

            ## Desktop App

            Download the installer for your platform from the Assets section below.
          files: release-assets/*

  # ── Cleanup all canary & beta images ─────────────────────────────────────

  cleanup-canary-images:
    name: "Cleanup: Canary Docker images"
    runs-on: ubuntu-latest
    needs: [metadata, github-release]
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Delete all canary images from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./.github/workflow_scripts/cleanup-ghcr-tags.sh
          OWNER=$(echo "${{ github.repository }}" | cut -d/ -f1)
          PACKAGE=$(echo "${{ github.repository }}" | cut -d/ -f2)
          ./.github/workflow_scripts/cleanup-ghcr-tags.sh \
            --package "$PACKAGE" \
            --owner   "$OWNER" \
            --filter  '.*-canary.*' \
            --verbose

  cleanup-beta-images:
    name: "Cleanup: Beta Docker images"
    runs-on: ubuntu-latest
    needs: [metadata, github-release]
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Delete all beta images from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./.github/workflow_scripts/cleanup-ghcr-tags.sh
          OWNER=$(echo "${{ github.repository }}" | cut -d/ -f1)
          PACKAGE=$(echo "${{ github.repository }}" | cut -d/ -f2)
          ./.github/workflow_scripts/cleanup-ghcr-tags.sh \
            --package "$PACKAGE" \
            --owner   "$OWNER" \
            --filter  '.*-beta.*' \
            --verbose

  # ── Cleanup all canary & beta GitHub releases ─────────────────────────────

  cleanup-canary-releases:
    name: "Cleanup: Canary GitHub releases"
    runs-on: ubuntu-latest
    needs: [github-release]
    steps:
      - name: Delete all canary GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list \
            --repo "${{ github.repository }}" \
            --limit 100 \
            --json tagName \
            --jq '.[] | .tagName' | \
          grep -- '-canary\.' | \
          while IFS= read -r tag; do
            echo "Deleting release: ${tag}"
            gh release delete "$tag" \
              --repo "${{ github.repository }}" \
              --cleanup-tag \
              --yes
          done

  cleanup-beta-releases:
    name: "Cleanup: Beta GitHub releases"
    runs-on: ubuntu-latest
    needs: [github-release]
    steps:
      - name: Delete all beta GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list \
            --repo "${{ github.repository }}" \
            --limit 100 \
            --json tagName \
            --jq '.[] | .tagName' | \
          grep -- '-beta\.' | \
          while IFS= read -r tag; do
            echo "Deleting release: ${tag}"
            gh release delete "$tag" \
              --repo "${{ github.repository }}" \
              --cleanup-tag \
              --yes
          done
