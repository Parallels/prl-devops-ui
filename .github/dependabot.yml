version: 2
updates:

  # ── npm (root workspace) ────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    # Group all non-major updates into a single PR to reduce noise
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
    ignore:
      # Tauri JS packages are tightly coupled to the Rust crates — update manually
      - dependency-name: "@tauri-apps/*"
    labels:
      - npm
      - dependencies
    # Dependabot auto-discovers npm workspaces (packages/ui-kit) from root
    commit-message:
      prefix: "deps"
      include: scope

  # ── Docker ──────────────────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - docker
      - dependencies
    commit-message:
      prefix: "deps/docker"
      include: scope

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - github-actions
      - dependencies
    commit-message:
      prefix: "deps/actions"
      include: scope
